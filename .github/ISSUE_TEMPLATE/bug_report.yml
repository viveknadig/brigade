name: Bug report
description: Report a problem with Brigade
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections
        below so we can reproduce and fix it quickly.

        ⚠️ **Do not paste API keys, tokens, or other secrets.** Redact anything
        sensitive from logs and config before pasting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `brigade ...`, I expected X but got Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug.
      placeholder: |
        1. Run `brigade onboard`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Output of `brigade doctor` and any error text (secrets redacted).
      render: shell
  - type: input
    id: version
    attributes:
      label: Brigade version
      description: Output of `brigade --version`.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: v22.12.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
