name: Feature request
description: Suggest an idea or enhancement for Brigade
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point motivating this request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Brigade to do? Sketch the CLI/UX if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or workarounds you use today.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, related issues.
